name: Verify Ex Origine

on:
  pull_request:
  push:
    branches:
      - main
      - 'codex/**'
      - 'copilot/**'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show compiler
        run: g++ --version

      - name: Run v1.0 verification
        run: |
          chmod +x scripts/verify_v1_0.sh scripts/verify_v0_6.sh scripts/verify_v0_1.sh
          ./scripts/verify_v1_0.sh
